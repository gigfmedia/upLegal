[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 8080
  targetPort = 8080

# Redirect www to non-www
[[redirects]]
  from = "https://www.legalup.cl/*"
  to = "https://legalup.cl/:splat"
  status = 301
  force = true


# Redirigir peticiones API a Render (Prioridad Alta)
[[redirects]]
  from = "/api/*"
  to = "https://uplegal-service.onrender.com/api/:splat"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

# Fallback para Netlify Functions si existen
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200


# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Control cache headers for JS files
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Control cache headers for index files
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[build.environment]
  NODE_VERSION = "18.0.0"